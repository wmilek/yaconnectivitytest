name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  run-connectivity-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Verify imports
        run: python -c "import connectivity; import database; print('Imports OK')"

      - name: Verify CLI entry point
        run: yaconnectivitytest --help

      - name: Run connectivity test (small sample)
        run: |
          python -c "
          import connectivity
          urls = {'http://google.com', 'http://github.com', 'http://wikipedia.org'}
          connectivity.connectivity_test_concurrent(urls)
          print('Connectivity test completed successfully')
          "
