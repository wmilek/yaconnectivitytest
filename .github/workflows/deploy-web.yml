name: Deploy web to Surge

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'database.py'
      - 'scripts/generate_database_js.py'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate web/database.js from database.py
        run: python scripts/generate_database_js.py

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: npx --yes surge ./web
